    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "BluePopcorn",
      "description": "Seerr MCP server + iMessage chatbot. Search, discover, and request movies and TV shows from Claude, ChatGPT, Gemini, or iMessage.",
      "url": "https://bluepopcorn.dev",
      "applicationCategory": "MultimediaApplication",
      "operatingSystem": "macOS, Linux, Windows",

  <body>
    <div id="root"></div>
    <noscript>
      <h1>BluePopcorn — Seerr MCP Server + iMessage Bot</h1>
      <p>Seerr MCP server + iMessage chatbot. Search, discover, and request movies and TV shows from Claude, ChatGPT, Gemini, or iMessage.</p>
      <h2>Install</h2>
      <p>MCP Server: <code>claude mcp add bluepopcorn -- uvx bluepopcorn</code></p>
      <p>iMessage Bot: <code>uv run -m bluepopcorn</code></p>
      <h2>MCP Tools</h2>
      <dl>
        <dt>seerr_search</dt><dd>Search movies and TV shows by title. Handles year extraction, fuzzy matching, and typo correction.</dd>
        <dt>seerr_recommend</dt><dd>Browse by genre, mood, keyword, or similarity.</dd>
        <dt>seerr_request</dt><dd>Request a title for download. Deduplicates automatically, fetches all seasons for TV.</dd>
        <dt>seerr_details</dt><dd>Full info on any title — Rotten Tomatoes, IMDB, trailers, download progress, seasons.</dd>
        <dt>seerr_recent</dt><dd>Recent additions, pending requests, active downloads.</dd>
      </dl>
      <h2>iMessage Bot</h2>
      <p>Run as a daemon on your Mac. Text it what you want to watch and it handles everything — search, recommendations, downloads, status updates. Works from any iMessage conversation.</p>
      <p><a href="https://github.com/Averyy/bluepopcorn">GitHub</a></p>
    </noscript>
