[llm]
model = "haiku"
fallback_model = "sonnet"
timeout = 60

[polling]
interval = 0.5
debounce_delay = 0.3

[digest]
time = "09:30"

[location]
timezone = "America/Toronto"

[paths]
poster_dir = "~/Pictures/bluepopcorn"
db_path = "~/.local/share/bluepopcorn/bot.db"
chat_db_path = "~/Library/Messages/chat.db"
log_path = "bluepopcorn.log"

[messages]
max_length = 1200
history_window = 20
history_gap_hours = 1.0

[notifications]
quiet_start = "22:00"
quiet_end = "07:00"

[webhooks]
port = 8095

[logging]
level = "INFO"
